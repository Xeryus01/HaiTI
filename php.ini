# php.ini configuration for cPanel - TimCare ITSM Dashboard
# Place this in your public_html directory or server root

# Memory limit
memory_limit = 256M

# Max execution time
max_execution_time = 300

# Max input time
max_input_time = 300

# Upload settings
upload_max_filesize = 10M
post_max_size = 12M
max_file_uploads = 20

# Error reporting for production
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
log_errors = On

# Timezone
date.timezone = "Asia/Jakarta"

# Session settings
session.save_path = "/tmp"
session.gc_probability = 1
session.gc_divisor = 100

# OPcache (if available)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 7963
opcache.revalidate_freq = 0

# Disable functions that might not be allowed
disable_functions = "exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source"

# Allow URL fopen for Laravel
allow_url_fopen = On